services:
  signaling:
    build:
      context: ./signaling-server
      dockerfile: Dockerfile
    image: oyot-backend:${TAG:-latest}
    ports:
      - "3002:3002"
    environment:
      PORT: "3002"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
