version: '3.9'

services:
  signaling:
    build:
      context: ./signaling-server
      dockerfile: Dockerfile
    image: oyot-backend:${TAG:-latest}
    ports:
      - "3001:3001"
      - "3002:3002"
    environment:
      PORT: "3001"
      HTTP_PORT: "3002"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 3
