  android:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;27.0.12077973"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Android signing
        run: |
          KEY_FILE="$RUNNER_TEMP/keystore.jks"
          P12_FILE="$RUNNER_TEMP/signing-key.p12"
          echo "${{ secrets.ANDROID_SIGNING_KEY }}" | tr -d '\n' | base64 -d > "$P12_FILE"
          echo "=== Decoded file size ==="
          stat --printf="%s" "$P12_FILE"
          echo ""
          if [ ! -s "$P12_FILE" ]; then
            echo "ERROR: Decoded signing key is empty"
            echo "=== Raw secret (first 50 chars) ==="
            echo "${{ secrets.ANDROID_SIGNING_KEY }}" | head -c 50 | xxd
            exit 1
          fi
          keytool -importkeystore -srckeystore "$P12_FILE" -srcstoretype PKCS12 \
            -destkeystore "$KEY_FILE" -deststoretype JKS \
            -srcstorepass "${{ secrets.KEY_STORE_PASSWORD }}" \
            -deststorepass "${{ secrets.KEY_STORE_PASSWORD }}" \
            -srcalias "${{ secrets.KEY_ALIAS }}" -destalias "${{ secrets.KEY_ALIAS }}" \
            -noprompt
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" > src-tauri/gen/android/keystore.properties
          echo "password=${{ secrets.KEY_STORE_PASSWORD }}" >> src-tauri/gen/android/keystore.properties
          echo "storeFile=$KEY_FILE" >> src-tauri/gen/android/keystore.properties

      - name: Build Android APK
        run: npm run tauri android build -- --apk

      - name: Upload Android APK to release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

